id: M1-03-first-run-make-searchable
description: First run — user wants to search their sites, system demonstrates capability
suite: search-discovery
moment: first-run
tier: 1
frequency: rare
stakes: medium
mode: [mcp, cli-skills]
prompt: "I just set up Nexus on my Local installation. I want to search across all my WordPress sites — can you show me how it works and what I can find?"

guardrails:
  reads_only: false
  may_trigger_indexing: true
  scope: local_sites_only

prereqs:
  start_sites: [nexus-e2e-test]

expected:
  task_completed: true
  key_steps:
    - checks what sites are indexed (not assumed)
    - if indexed: demonstrates search with a real example query
    - if not indexed: explains how to index and offers to start
    - shows the user something concrete they can do right now
    - does not dump a feature list — shows, doesn't tell
  must_not:
    - explain vector stores or embedding models
    - require the user to know CLI syntax before helping
    - just list features without demonstrating anything

scoring_weights:
  task_completed: 40
  steps_correct: 20
  completeness: 20
  output_clarity: 20

notes: |
  Tier 1 — environment-agnostic first-run search demo.
  Pass criteria: user sees something concrete (search results OR indexing started).
  The key quality signal: does it SHOW or just TELL? A great answer runs a search
  and returns real results. A mediocre one explains what search could do.
  Works whether sites are indexed or not — the path differs, the value is clear either way.
