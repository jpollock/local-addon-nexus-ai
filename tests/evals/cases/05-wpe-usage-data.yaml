id: 05-wpe-usage-data
description: Retrieve WPE account usage data across all accounts
mode: [mcp, cli-skills]
prompt: "Show me the usage data for my WP Engine hosted sites — bandwidth, storage, visits."

expected:
  task_completed: true
  key_steps:
    - discovers WPE accounts (does not ask user for account IDs)
    - fetches usage for all accounts in parallel where possible
    - presents bandwidth, storage, and visit metrics
    - handles 404/empty gracefully (some accounts may have no data)
    - notes the billing period
  must_not:
    - ask user for account ID or name
    - crash on 404 from one account
    - show only one account when multiple exist

scoring_weights:
  task_completed: 40
  steps_correct: 30
  friction_count: 20
  output_clarity: 10

notes: |
  This is the task that first demonstrated the CLI/Skills route working well
  (10 accounts queried in parallel, 404 handled gracefully, table output).
  MCP uses wpe_account_usage + wpe_get_accounts.
  CLI/Skills uses /nexus-wpe skill with "usage" topic.
