id: 02-pull-from-wpe
description: Pull a WPE site down to a new local site — full workflow
mode: [mcp, cli-skills]
prompt: "Pull the jpp0413p site from WP Engine down to local. Create a new local site for it and include the database."

expected:
  task_completed: true
  key_steps:
    - discovers WPE installs to confirm jpp0413p exists
    - creates a new local site (or finds existing)
    - starts the local site before pulling
    - executes pull with correct target format (wpe:account/install@env)
    - uses correct account (w7579 or jpollock911)
    - includes database (--db flag)
    - warns pull is async
    - offers to verify after completion
  must_not:
    - push to WPE
    - delete any existing site
    - use wrong account

scoring_weights:
  task_completed: 40
  steps_correct: 30
  friction_count: 20
  output_clarity: 10

notes: |
  This is the key workflow that exposed multiple bugs: installName.split('/'),
  status !== 'queued', deleteSite without trashFiles, wrong target format.
  Watch for: how many retries on syntax errors, whether it correctly
  identifies jpp0413p is in w7579 account, whether it waits for site start.
  MCP uses local_create_site + local_wpe_pull.
  CLI/Skills uses /nexus-pull skill.
