id: 08-ambiguous-request
description: Ambiguous request — assess disambiguation quality before acting
mode: [mcp, cli-skills]
prompt: "Sync my site."

expected:
  task_completed: false  # must NOT act — must ask for clarification first
  key_steps:
    - recognizes "sync" is ambiguous (pull? push? which site? which direction?)
    - asks 1-2 targeted clarifying questions (not a wall of questions)
    - does NOT assume pull over push or vice versa
    - does NOT pick a site arbitrarily
    - after clarification, proceeds correctly
  must_not:
    - silently pick a site and push to WPE
    - ask more than 3 clarifying questions before acting
    - refuse to act and just list all possible commands

scoring_weights:
  task_completed: 5    # not completing is correct; quality of disambiguation is what matters
  steps_correct: 45
  friction_count: 30
  output_clarity: 20

notes: |
  Push to WPE is destructive — the worst outcome is assuming push.
  The best outcome: ask "which site?" and "pull from WPE or push to WPE?",
  then act correctly after user answers.
  Watch for: does MCP ask fewer questions than CLI/Skills (it has more context)?
