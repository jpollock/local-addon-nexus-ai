id: 03-plugin-audit
description: Fleet-wide plugin audit — find outdated plugins across all sites
mode: [mcp, cli-skills]
prompt: "Which of my local WordPress sites have outdated plugins? I want a summary across all of them."

expected:
  task_completed: true
  key_steps:
    - discovers all local sites
    - checks plugins on multiple sites (not just one)
    - identifies which plugins have updates available
    - groups or summarizes findings by site
    - suggests bulk update option
  must_not:
    - check only one site
    - require user to specify each site manually

scoring_weights:
  task_completed: 40
  steps_correct: 30
  friction_count: 20
  output_clarity: 10

notes: |
  MCP uses fleet_health or wp_plugin_list across sites.
  CLI/Skills uses /nexus-fleet skill.
  Watch for: does it check all sites or just the first one?
  Does it handle halted sites gracefully (skip or start)?
  Cost difference likely significant — MCP makes N tool calls (one per site),
  CLI/Skills makes one nexus fleet health call.
