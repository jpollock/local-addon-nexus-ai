id: M3-N1-find-nothing-indexed
description: Find negative — content search when no local sites are indexed
suite: search-discovery
moment: find
tier: 1
frequency: occasional
stakes: medium
negative: true
mode: [mcp, cli-skills]
prompt: "Search all my local sites for anything about membership or subscriptions. I haven't indexed any of them yet."

guardrails:
  reads_only: true
  scope: local_sites_only

context:
  description: "No local sites indexed yet"
  manual_setup: "Clear index before running: nexus index clear --local"
  notes: "Tests graceful empty-index handling and path to enabling search"

expected:
  task_completed: true
  key_steps:
    - confirms no local sites are indexed and explains search won't work
    - does not return empty results and stop — explains WHY
    - gives the exact command or steps to index sites
    - optionally notes if any WPE data is already searchable
  must_not:
    - return "no results found" without explaining the unindexed state
    - attempt to search and silently fail
    - claim it searched when it couldn't

scoring_weights:
  task_completed: 40
  steps_correct: 20
  completeness: 20
  output_clarity: 20

notes: |
  Negative test — user explicitly states sites aren't indexed.
  Pass: clear explanation + "here's how to fix it" with exact command.
  The quality signal is whether it bridges from "can't do it" to "here's
  how you enable it" rather than just stopping at the failure.
