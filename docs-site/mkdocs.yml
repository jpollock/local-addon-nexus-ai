site_name: Nexus AI Documentation
site_description: AI-powered WordPress site intelligence for Local and WP Engine
site_author: Jeremy Pollock
site_url: https://jpollock.github.io/local-addon-nexus-ai/

repo_name: jpollock/local-addon-nexus-ai
repo_url: https://github.com/jpollock/local-addon-nexus-ai
edit_uri: edit/main/docs-site/docs/

theme:
  name: material
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  features:
    - navigation.instant      # Instant loading
    - navigation.tracking     # Anchor tracking
    - navigation.tabs         # Top-level tabs
    - navigation.sections     # Section navigation
    - navigation.expand       # Expand sections
    - navigation.top          # Back to top button
    - search.suggest          # Search suggestions
    - search.highlight        # Highlight search results
    - content.code.copy       # Copy code button
    - content.code.annotate   # Code annotations
    - content.tabs.link       # Link content tabs

  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

plugins:
  - search:
      lang: en

markdown_extensions:
  # Code highlighting
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - pymdownx.snippets

  # Admonitions
  - admonition
  - pymdownx.details

  # Tabs
  - pymdownx.tabbed:
      alternate_style: true

  # Task lists
  - pymdownx.tasklist:
      custom_checkbox: true

  # Tables
  - tables

  # Footnotes
  - footnotes

  # Metadata
  - meta

  # Attributes (required for grid cards and icons)
  - attr_list
  - md_in_html

  # Emoji (for Material icons)
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

  # Table of contents
  - toc:
      permalink: true
      toc_depth: 3

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/wpengine/local-addon-nexus-ai
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/wpengine

  version:
    provider: mike

extra_css:
  - stylesheets/extra.css

