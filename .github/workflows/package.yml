name: Package Addon

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  package:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: macos-14
            platform: darwin
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: windows-latest
            platform: win32
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Cache ONNX model
        id: model-cache
        uses: actions/cache@v4
        with:
          path: models
          key: onnx-model-${{ hashFiles('scripts/download-model.js') }}

      - name: Download ONNX model
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: npm run download-model

      - name: Build
        run: npm run build

      - name: Package for ${{ matrix.platform }}-${{ matrix.arch }}
        run: node scripts/package-addon.js --platform ${{ matrix.platform }} --arch ${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexus-ai-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/*.tgz
          retention-days: 30

  release:
    needs: package
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}

          gh release create $GITHUB_REF_NAME \
            --repo ${{ github.repository }} \
            --title "Nexus AI v${VERSION}" \
            --generate-notes

          for artifact_dir in artifacts/*/; do
            for tarball in "$artifact_dir"*.tgz; do
              if [ -f "$tarball" ]; then
                echo "Uploading $(basename "$tarball")"
                gh release upload $GITHUB_REF_NAME "$tarball" \
                  --repo ${{ github.repository }}
              fi
            done
          done

      - name: Upload to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

          # Install AWS CLI if needed
          aws --version 2>/dev/null || pip install awscli --quiet

          for artifact_dir in artifacts/*/; do
            for tarball in "$artifact_dir"*.tgz; do
              if [ -f "$tarball" ]; then
                FILENAME=$(basename "$tarball")
                echo "Uploading $FILENAME to R2..."
                aws s3 cp "$tarball" \
                  "s3://nexus-ai-releases/nexus-ai/v${VERSION}/${FILENAME}" \
                  --endpoint-url "$ENDPOINT" \
                  --region auto
              fi
            done
          done

          echo "✅ All tarballs uploaded to releases.elasticapi.io/nexus-ai/v${VERSION}/"

  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Cache ONNX model
        id: model-cache
        uses: actions/cache@v4
        with:
          path: models
          key: onnx-model-${{ hashFiles('scripts/download-model.js') }}

      - name: Download ONNX model
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: npm run download-model

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
