name: Package Addon

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  package:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: macos-13
            platform: darwin
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: windows-latest
            platform: win32
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download ONNX model
        run: npm run download-model

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Package for ${{ matrix.platform }}-${{ matrix.arch }}
        run: node scripts/package-addon.js --platform ${{ matrix.platform }} --arch ${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexus-ai-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/*.tgz
          retention-days: 30

  release:
    needs: package
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Extract version from tag (v0.1.0 -> 0.1.0)
          VERSION=${GITHUB_REF#refs/tags/v}

          # Create release
          gh release create $GITHUB_REF_NAME \
            --repo ${{ github.repository }} \
            --title "Nexus AI v${VERSION}" \
            --generate-notes

          # Upload all platform tarballs
          for artifact_dir in artifacts/*/; do
            for tarball in "$artifact_dir"*.tgz; do
              if [ -f "$tarball" ]; then
                echo "Uploading $(basename "$tarball")"
                gh release upload $GITHUB_REF_NAME "$tarball" \
                  --repo ${{ github.repository }}
              fi
            done
          done
