name: Package Addon

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.2.0)'
        required: true

jobs:
  # Create the GitHub Release first so platform jobs can attach assets to it
  create-release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    outputs:
      upload_url: ${{ steps.create.outputs.upload_url }}
    steps:
      - name: Create GitHub Release
        id: create
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create $GITHUB_REF_NAME \
            --repo ${{ github.repository }} \
            --title "Nexus AI ${GITHUB_REF_NAME}" \
            --generate-notes \
            --draft
          echo "upload_url=done" >> $GITHUB_OUTPUT

  package:
    needs: create-release
    if: always() && !failure() && !cancelled()
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: macos-14
            platform: darwin
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: windows-latest
            platform: win32
            arch: x64

    runs-on: ${{ matrix.os }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Fetch model from R2 cache (or download from Hugging Face)
        shell: bash
        run: |
          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          MODEL_KEY="model-cache/all-MiniLM-L6-v2-quantized.tar.gz"
          mkdir -p models
          if aws s3 cp "s3://nexus-ai-releases/${MODEL_KEY}" /tmp/model-cache.tar.gz \
              --endpoint-url "$ENDPOINT" --region auto --quiet 2>/dev/null; then
            tar -xzf /tmp/model-cache.tar.gz -C models
            echo "✅ Model restored from R2 cache"
          else
            echo "⬇️ R2 cache miss — downloading from Hugging Face"
            npm run download-model
            tar -czf /tmp/model-cache.tar.gz -C models .
            aws s3 cp /tmp/model-cache.tar.gz \
              "s3://nexus-ai-releases/${MODEL_KEY}" \
              --endpoint-url "$ENDPOINT" --region auto --quiet || true
            echo "✅ Model downloaded and saved to R2 cache"
          fi

      - name: Build
        run: npm run build

      - name: Package for ${{ matrix.platform }}-${{ matrix.arch }}
        run: node scripts/package-addon.js --platform ${{ matrix.platform }} --arch ${{ matrix.arch }}

      - name: Upload tarball to R2 and GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

          for tarball in dist/*.tgz; do
            [ -f "$tarball" ] || continue
            FILENAME=$(basename "$tarball")

            echo "Uploading $FILENAME to R2..."
            aws s3 cp "$tarball" \
              "s3://nexus-ai-releases/nexus-ai/v${VERSION}/${FILENAME}" \
              --endpoint-url "$ENDPOINT" \
              --region auto

            echo "Attaching $FILENAME to GitHub Release..."
            gh release upload $GITHUB_REF_NAME "$tarball" \
              --repo ${{ github.repository }}
          done

  release:
    needs: package
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}

    steps:
      - name: Update latest.json and publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

          echo "{\"version\":\"${VERSION}\"}" > /tmp/latest.json
          aws s3 cp /tmp/latest.json \
            "s3://nexus-ai-releases/nexus-ai/latest.json" \
            --endpoint-url "$ENDPOINT" \
            --region auto \
            --cache-control "no-cache, max-age=0"
          echo "✅ latest.json updated to v${VERSION}"

          gh release edit $GITHUB_REF_NAME \
            --repo ${{ github.repository }} \
            --draft=false
          echo "✅ Release published"

  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Fetch model from R2 cache
        shell: bash
        run: |
          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          MODEL_KEY="model-cache/all-MiniLM-L6-v2-quantized.tar.gz"
          mkdir -p models
          aws s3 cp "s3://nexus-ai-releases/${MODEL_KEY}" /tmp/model-cache.tar.gz \
            --endpoint-url "$ENDPOINT" --region auto
          tar -xzf /tmp/model-cache.tar.gz -C models
          echo "✅ Model restored from R2 cache"

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
