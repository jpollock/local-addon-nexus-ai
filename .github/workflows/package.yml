name: Package Addon

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  download-model:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Try fetch model from R2 cache
        id: r2-cache
        run: |
          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          MODEL_KEY="model-cache/all-MiniLM-L6-v2-quantized.tar.gz"
          mkdir -p models
          if aws s3 cp "s3://nexus-ai-releases/${MODEL_KEY}" /tmp/model-cache.tar.gz \
              --endpoint-url "$ENDPOINT" --region auto --quiet 2>/dev/null; then
            tar -xzf /tmp/model-cache.tar.gz -C models
            echo "hit=true" >> $GITHUB_OUTPUT
            echo "✅ Model restored from R2 cache"
          else
            echo "hit=false" >> $GITHUB_OUTPUT
            echo "⬇️ Model not in R2, will download from Hugging Face"
          fi

      - name: Setup Node.js
        if: steps.r2-cache.outputs.hit != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.r2-cache.outputs.hit != 'true'
        run: npm ci --legacy-peer-deps

      - name: Download ONNX model from Hugging Face
        if: steps.r2-cache.outputs.hit != 'true'
        run: npm run download-model

      - name: Save model to R2 cache
        if: steps.r2-cache.outputs.hit != 'true'
        run: |
          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          tar -czf /tmp/model-cache.tar.gz -C models .
          aws s3 cp /tmp/model-cache.tar.gz \
            "s3://nexus-ai-releases/model-cache/all-MiniLM-L6-v2-quantized.tar.gz" \
            --endpoint-url "$ENDPOINT" --region auto
          echo "✅ Model saved to R2 cache for future builds"

      - name: Upload model as artifact
        uses: actions/upload-artifact@v4
        with:
          name: onnx-model
          path: models
          retention-days: 1

  package:
    needs: download-model
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: macos-14
            platform: darwin
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: windows-latest
            platform: win32
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Download ONNX model artifact
        uses: actions/download-artifact@v4
        with:
          name: onnx-model
          path: models

      - name: Build
        run: npm run build

      - name: Package for ${{ matrix.platform }}-${{ matrix.arch }}
        run: node scripts/package-addon.js --platform ${{ matrix.platform }} --arch ${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexus-ai-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/*.tgz
          retention-days: 30

  release:
    needs: package
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}

          gh release create $GITHUB_REF_NAME \
            --repo ${{ github.repository }} \
            --title "Nexus AI v${VERSION}" \
            --generate-notes

          for artifact_dir in artifacts/*/; do
            for tarball in "$artifact_dir"*.tgz; do
              if [ -f "$tarball" ]; then
                echo "Uploading $(basename "$tarball")"
                gh release upload $GITHUB_REF_NAME "$tarball" \
                  --repo ${{ github.repository }}
              fi
            done
          done

      - name: Upload to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

          # Install AWS CLI if needed
          aws --version 2>/dev/null || pip install awscli --quiet

          for artifact_dir in artifacts/*/; do
            for tarball in "$artifact_dir"*.tgz; do
              if [ -f "$tarball" ]; then
                FILENAME=$(basename "$tarball")
                echo "Uploading $FILENAME to R2..."
                aws s3 cp "$tarball" \
                  "s3://nexus-ai-releases/nexus-ai/v${VERSION}/${FILENAME}" \
                  --endpoint-url "$ENDPOINT" \
                  --region auto
              fi
            done
          done

          echo "✅ All tarballs uploaded to releases.elasticapi.io/nexus-ai/v${VERSION}/"

          # Update latest.json so nexus update can check for new versions
          echo "{\"version\":\"${VERSION}\"}" > /tmp/latest.json
          aws s3 cp /tmp/latest.json \
            "s3://nexus-ai-releases/nexus-ai/latest.json" \
            --endpoint-url "$ENDPOINT" \
            --region auto \
            --cache-control "no-cache, max-age=0"
          echo "✅ latest.json updated to v${VERSION}"

  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Download ONNX model artifact
        uses: actions/download-artifact@v4
        with:
          name: onnx-model
          path: models

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
