name: Package Addon

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  package:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: macos-13
            platform: darwin
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: windows-latest
            platform: win32
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download ONNX model
        run: npm run download-model

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Package for ${{ matrix.platform }}-${{ matrix.arch }}
        run: node scripts/package-addon.js --platform ${{ matrix.platform }} --arch ${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: local-addon-nexus-ai-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/*.tar.gz
          retention-days: 30
