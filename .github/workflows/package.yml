name: Package Addon

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  package:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: macos-14
            platform: darwin
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: windows-2022
            platform: win32
            arch: x64

    runs-on: ${{ matrix.os }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Fetch model from R2 cache (or download from Hugging Face)
        shell: bash
        run: |
          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          MODEL_KEY="model-cache/all-MiniLM-L6-v2-quantized.tar.gz"
          mkdir -p models
          if aws s3 cp "s3://nexus-ai-releases/${MODEL_KEY}" /tmp/model-cache.tar.gz \
              --endpoint-url "$ENDPOINT" --region auto --quiet 2>/dev/null; then
            tar -xzf /tmp/model-cache.tar.gz -C models
            echo "✅ Model restored from R2 cache"
          else
            echo "⬇️ R2 cache miss — downloading from Hugging Face"
            npm run download-model
            tar -czf /tmp/model-cache.tar.gz -C models .
            aws s3 cp /tmp/model-cache.tar.gz \
              "s3://nexus-ai-releases/${MODEL_KEY}" \
              --endpoint-url "$ENDPOINT" --region auto --quiet || true
            echo "✅ Model downloaded and saved to R2 cache"
          fi

      - name: Setup MSVC (Windows only)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure node-gyp for Windows
        if: runner.os == 'Windows'
        shell: cmd
        run: npm config set msvs_version 2022

      - name: Build
        run: npm run build

      - name: Package for ${{ matrix.platform }}-${{ matrix.arch }}
        env:
          GYP_MSVS_VERSION: '2022'
          npm_config_msvs_version: '2022'
        run: node scripts/package-addon.js --platform ${{ matrix.platform }} --arch ${{ matrix.arch }}

      - name: Upload tarball to R2
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          for tarball in dist/*.tgz; do
            [ -f "$tarball" ] || continue
            FILENAME=$(basename "$tarball")
            echo "Uploading $FILENAME to R2..."
            aws s3 cp "$tarball" \
              "s3://nexus-ai-releases/nexus-ai/v${VERSION}/${FILENAME}" \
              --endpoint-url "$ENDPOINT" \
              --region auto
          done
          echo "✅ Tarballs uploaded to R2"

  release:
    needs: package
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}

    steps:
      - name: Download tarballs from R2 and create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

          # Download all tarballs for this version from R2
          mkdir -p dist
          aws s3 sync \
            "s3://nexus-ai-releases/nexus-ai/v${VERSION}/" \
            dist/ \
            --endpoint-url "$ENDPOINT" \
            --region auto

          echo "Downloaded tarballs:"
          ls -la dist/

          # Create GitHub Release (delete existing draft if any, then create fresh)
          gh release delete $GITHUB_REF_NAME \
            --repo ${{ github.repository }} \
            --yes 2>/dev/null || true

          gh release create $GITHUB_REF_NAME \
            --repo ${{ github.repository }} \
            --title "Nexus AI v${VERSION}" \
            --generate-notes \
            dist/*.tgz

          echo "✅ GitHub Release created with all tarballs"

          # Update latest.json
          echo "{\"version\":\"${VERSION}\"}" > /tmp/latest.json
          aws s3 cp /tmp/latest.json \
            "s3://nexus-ai-releases/nexus-ai/latest.json" \
            --endpoint-url "$ENDPOINT" \
            --region auto \
            --cache-control "no-cache, max-age=0"
          echo "✅ latest.json updated to v${VERSION}"

  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies
        # --ignore-scripts skips onnxruntime-node postinstall (GPU binary download)
        # publish-npm only needs TypeScript compilation, not native binaries or ONNX model
        run: npm ci --ignore-scripts --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
